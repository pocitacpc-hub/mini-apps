<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Apps – rozcestník</title>
  <link rel="stylesheet" href="shared/shell.css" />
  <script defer src="shared/hub.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 64 64" fill="none">
          <path d="M18 18h28v28H18z" stroke="currentColor" stroke-width="3" />
          <path d="M24 32h16" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          <path d="M32 24v16" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
        </svg>
      </div>
      <div>
        <div class="title">Mini Apps</div>
        <div class="subtitle">Rozcestník aplikací</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div class="hero-card">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="hero-content">
          <h1>Rozcestník</h1>
          <p>Seznam aplikací se načítá z JSONu. Přidání nové appky = jen nový adresář + záznam do apps.json.</p>

          <div class="hub-controls">
            <input id="search" class="hub-search" type="text" placeholder="Hledat aplikaci…" />
          </div>

          <div id="appGrid" class="app-grid" aria-live="polite"></div>
          <div id="hubError" class="hub-error" role="alert" style="display:none;"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div>Tip: kvůli fetch(JSON) spouštěj přes lokální HTTP server.</div>
  </footer>
</body>
</html>
